<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukumari Ruleta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --bg: #f3f4f9; --card: #ffffff; --text: #5b6b8c; 
            --accent: #0084a8; 
            --success: #10b981; --danger: #ef4444; --panel-bg: #f8fafc;
            --btn-theme: #ffffff; --btn-text: #5b6b8c; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --modal-q: #1e293b; --floating-card: #ffffff; --label-color: #94a3b8;
            --sidebar-width: 380px;
        }

        body.theme-dark {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --panel-bg: #0f172a; 
            --btn-theme: #334155; --btn-text: #f1f5f9; --modal-q: #ffffff;
            --floating-card: #1e293b; --label-color: #cbd5e1;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; transition: 0.3s; }
        
        .app-container { 
            display: grid; 
            grid-template-columns: var(--sidebar-width) 1fr; 
            height: 100vh; 
            transition: grid-template-columns 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-sidebar {
            position: fixed;
            left: 400px; 
            bottom: 40px; 
            z-index: 9999; 
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-hidden + .toggle-sidebar { left: 20px; }
        .app-container.sidebar-hidden { grid-template-columns: 0px 1fr; }

        .side-panel { 
            background: var(--card); 
            border-right: 1px solid rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 25px; 
            z-index: 20;
            transition: opacity 0.3s;
            position: relative;
        }

        .sidebar-hidden .side-panel { opacity: 0; pointer-events: none; padding: 0; }

        .brand-container { margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-weight: 800; color: var(--accent); font-size: 2.2rem; margin: 0; line-height: 1; }
        #dynamic-logo { height: 50px; width: auto; object-fit: contain; }
        
        .scoreboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .score-box { padding: 15px; border-radius: 14px; text-align: center; color: white; }
        .score-aciertos { background: #10b981; } .score-errores { background: #ef4444; }
        .score-val { font-size: 2rem; display: block; font-weight: 800; }
        .score-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.9; }

        .center-content { 
            display: flex; align-items: center; justify-content: center; 
            background: var(--panel-bg); padding: 20px; position: relative; overflow: hidden;
        }

        #canvas-container { 
            position: relative; width: 480px; height: 480px; display: flex;
            justify-content: center; align-items: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center center;
        }

        .sidebar-hidden #canvas-container { transform: scale(1.18); }

        canvas { 
            max-width: 90vh; max-height: 90vh; border-radius: 50%; 
            border: 12px solid white; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
        }
        
        #pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 20px solid transparent; 
            border-right: 20px solid transparent; border-top: 40px solid var(--accent); z-index: 10; 
        }

        .btn-spin { 
            position: absolute; background: var(--accent); color: white; 
            font-size: 1.1rem; width: 100px; height: 100px; border-radius: 50%; 
            border: 6px solid white; cursor: pointer; font-weight: 800; 
            box-shadow: 0 10px 25px rgba(0, 132, 168, 0.4); transition: 0.3s; z-index: 15; 
        }
        .btn-spin:hover:not(:disabled) { transform: scale(1.1); }
        .btn-spin:disabled { background: #cbd5e1; cursor: not-allowed; }

        input[type="checkbox"] {
            accent-color: var(--accent);
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        #floating-panel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); 
            width: 650px; background: var(--floating-card); border-radius: 30px; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.3); padding: 40px; z-index: 1000; 
            text-align: center; transition: 0.4s; opacity: 0; 
        }
        #floating-panel.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        
        #answer-banner {
            display: none; width: 100%; padding: 20px; border-radius: 15px;
            margin-bottom: 25px; font-weight: 700; color: white; box-sizing: border-box;
            text-align: center; font-size: 1.1rem; line-height: 1.4;
        }
        .banner-correct { background: #10b981 !important; display: block !important; }
        .banner-wrong { background: #ef4444 !important; display: block !important; }

        #panel-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        .opt-btn { 
            width: 100%; padding: 20px; border-radius: 12px; border: 2px solid #f1f5f9; 
            cursor: pointer; font-weight: 700; background: #f8fafc; font-size: 1rem; color: #334155; transition: 0.2s;
        }
        /* Mejora de legibilidad en modo oscuro para el panel flotante */
        body.theme-dark .opt-btn { background: #334155; color: #f1f5f9; border-color: #475569; }
        body.theme-dark #panel-question { color: #f8fafc !important; }

        .opt-correct { background: #dcfce7 !important; border-color: #10b981 !important; color: #065f46 !important; }
        .opt-wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .btn-finalize {
            margin-top: 30px; border: none; background: none; color: var(--accent);
            cursor: pointer; font-weight: 800; font-size: 1.1rem; transition: 0.3s; text-transform: uppercase;
        }
        .btn-finalize:hover { transform: scale(1.1); }

        .config-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; color: var(--label-color); text-transform: uppercase; }
        .switch-card { background: var(--panel-bg); padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .palette-option { display: flex; justify-content: center; align-items: center; padding: 8px; background: var(--panel-bg); border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
        .palette-option.active { border-color: var(--accent); background: #eff6ff; }
        .color-preview { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .theme-btn { padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; cursor: pointer; font-size: 0.7rem; background: var(--btn-theme); color: var(--btn-text); }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; min-height: 60px; box-sizing: border-box; background: var(--bg); color: var(--text); }
        .btn-small { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; margin-top: 5px; }
        .list-container { border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; padding: 10px; max-height: 120px; overflow-y: auto; margin-bottom: 8px; background: var(--panel-bg); }
        .msg { background: var(--card); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; position: relative; font-size: 0.85rem; border: 1px solid rgba(0,0,0,0.05); }
        .history-item { font-size: 0.75rem; padding: 10px; border-radius: 12px; background: var(--card); margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); transition: 0.2s; }
        .history-item:hover { border-color: var(--accent); background: #eff6ff; }
        .history-name { font-weight: 800; color: #1e293b; display: block; margin-bottom: 2px; }
        body.theme-dark .history-name { color: #f1f5f9; }
        .history-date { font-size: 0.65rem; color: #94a3b8; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 1; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        .btn-close-panel { position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.8rem; color: var(--label-color); cursor: pointer; line-height: 1; transition: 0.2s; }
        .btn-close-panel:hover { color: #ef4444; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="app-container sidebar-hidden" id="main-container">
        <div class="side-panel">
            <div class="brand-container">
                <div class="brand">UKUMARI</div>
                <img id="dynamic-logo" src="Ukumari logo blanco.jpg" alt="Logo">
            </div>
            
            <div class="scoreboard">
                <div class="score-box score-aciertos"><span class="score-val" id="count-aciertos">0</span><span class="score-label">Aciertos</span></div>
                <div class="score-box score-errores"><span class="score-val" id="count-errores">0</span><span class="score-label">Errores</span></div>
            </div>

            <div class="switch-card">
                <span style="font-weight:700; font-size:0.8rem;">Sonidos</span>
                <input type="checkbox" id="sound-mode" checked>
            </div>
            <div class="switch-card">
                <span style="font-weight:700; font-size:0.8rem;">Auto-eliminar</span>
                <input type="checkbox" id="delete-mode" checked>
            </div>
            
            <div class="config-group">
                <label>Paletas de Color</label>
                <div class="palette-grid" id="palette-grid"></div>
            </div>

            <div class="config-group">
                <label>Modo de Pantalla</label>
                <div class="theme-grid">
                    <button class="theme-btn" onclick="setTheme('light')">CLARO</button>
                    <button class="theme-btn" onclick="setTheme('dark')">OSCURO</button>
                </div>
            </div>

            <div class="config-group">
                <label>Cargar Preguntas</label>
                <textarea id="manual-text" placeholder="Escribe una pregunta por línea..."></textarea>
                <button class="btn-small" style="background:var(--accent); color:white;" onclick="addFromText()">Cargar Lista Manual</button>
                <button class="btn-small" style="background:#10b981; color:white;" onclick="document.getElementById('excel-input').click()">📁 Importar Excel</button>
                <input type="file" id="excel-input" accept=".xlsx, .xls" style="display:none">
            </div>

            <div class="config-group">
                <label>Ruleta Actual</label>
                <div class="list-container" id="chat-box"></div>
                <button class="btn-small" style="background:rgba(100, 116, 139, 0.1); color:var(--text); font-size:0.7rem;" onclick="clearCurrent()">Limpiar Ruleta Actual</button>
            </div>

            <div class="config-group" style="margin-top: 20px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px;">
                <label>Historial de Sesiones</label>
                <div class="list-container" id="history-box" style="max-height: 200px;"></div>
                <button class="btn-small" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; font-size:0.7rem;" onclick="clearHistory()">Vaciar Historial</button>
            </div>
        </div>

        <div class="center-content" id="confetti-zone">
            <div id="canvas-container">
                <div id="pointer"></div>
                <canvas id="wheel" width="480" height="480"></canvas>
                <button class="btn-spin" id="spin-btn" onclick="spinNow()">¡GIRAR!</button>
            </div>
            
            <div id="floating-panel">
                <button class="btn-close-panel" onclick="closePanelManual()">×</button>
                <div id="answer-banner"></div> 
                <h3 id="panel-question" style="font-size: 1.8rem; margin-bottom: 20px; color: #334155;"></h3>
                <div id="panel-options"></div>
                <button class="btn-finalize" onclick="finalizeQuestion()">Siguiente</button>
            </div>
        </div>
    </div>

    <button class="toggle-sidebar" id="config-btn" onclick="toggleSidebar()" title="Configuración">⚙️</button>

    <script>
        function toggleSidebar() {
            const container = document.getElementById('main-container');
            container.classList.toggle('sidebar-hidden');
            SFX.click();
        }

        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol = 0.1) {
            if(!document.getElementById('sound-mode').checked) return;
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(vol, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, AudioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(AudioCtx.destination);
            osc.start();
            osc.stop(AudioCtx.currentTime + duration);
        }

        const SFX = {
            spin: () => {
                if(!document.getElementById('sound-mode').checked) return;
                const osc = AudioCtx.createOscillator();
                const gain = AudioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, AudioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, AudioCtx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.03);
                osc.connect(gain);
                gain.connect(AudioCtx.destination);
                osc.start();
                osc.stop(AudioCtx.currentTime + 0.04);
            },
            win: () => {
                playTone(523.25, 'triangle', 0.4, 0.1);
                setTimeout(() => playTone(659.25, 'triangle', 0.4, 0.1), 120);
                setTimeout(() => playTone(783.99, 'triangle', 0.6, 0.1), 240);
            },
            correct: () => {
                playTone(600, 'sine', 0.2, 0.1);
                setTimeout(() => playTone(900, 'sine', 0.3, 0.1), 100);
            },
            wrong: () => {
                const osc = AudioCtx.createOscillator();
                const gain = AudioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, AudioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, AudioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.15, AudioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(AudioCtx.destination);
                osc.start();
                osc.stop(AudioCtx.currentTime + 0.3);
            },
            click: () => playTone(400, 'sine', 0.05, 0.05)
        };

        const paletas = {
            imagen: { colors: ['#F997B2', '#FBB4A5', '#FDD792', '#CDE5A6', '#A9C4F5', '#D1D1F7'] },
            calido: { colors: ['#FAD7A0', '#F5B041', '#F1948A', '#E6B0AA', '#FFCCBC', '#FFAB91'] },
            calculo: { colors: ['#B8EBD0', '#A8D8EA', '#AAABEE', '#7F86D1', '#9ED9C6', '#87CEEB'] },
            lavanda: { colors: ['#D1D1F7', '#B2B2F2', '#E2E2F7', '#C1C1F0', '#A2A2D0', '#9575CD'] },
            bosque: { colors: ['#E2F0D9', '#C5E0B4', '#A9D08E', '#8FBC8F', '#E8F5E9', '#C8E6C9'] }
        };

        let items = JSON.parse(localStorage.getItem('uk_items')) || [];
        let sessionHistory = JSON.parse(localStorage.getItem('uk_history')) || [];
        let manualCount = parseInt(localStorage.getItem('uk_manual_count')) || 0;
        let aciertos = 0, errores = 0, currentRotation = 0, currentHue = 'imagen', lastWinnerIdx = -1, canAnswer = false;

        function createConfetti() {
            const zone = document.getElementById('confetti-zone');
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.top = '-20px';
                c.style.backgroundColor = `hsl(${Math.random()*360}, 80%, 60%)`;
                c.style.animationDelay = Math.random() * 2 + 's';
                zone.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        function renderPaletteUI() {
            const grid = document.getElementById('palette-grid');
            grid.innerHTML = Object.keys(paletas).map(key => `
                <div class="palette-option ${currentHue === key ? 'active' : ''}" onclick="setPalette('${key}', this)">
                    <div class="color-preview" style="background: conic-gradient(${paletas[key].colors.slice(0,4).join(',')})"></div>
                </div>
            `).join('');
        }

        function spinNow() {
            if(!items.length) return;
            SFX.click();
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const duration = 4000;
            const extraDegrees = Math.floor(Math.random() * 360) + 1800;
            currentRotation += extraDegrees;
            const canvas = document.getElementById('wheel');
            canvas.style.transition = `transform ${duration}ms cubic-bezier(0.1, 0, 0.1, 1)`;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            let start = null;
            function playSpinSound(timestamp) {
                if (!start) start = timestamp;
                let progress = (timestamp - start) / duration;
                if (progress < 1) {
                    let speedFactor = Math.pow(1 - progress, 2); 
                    let nextTick = 40 + (1 - speedFactor) * 550; 
                    SFX.spin();
                    setTimeout(() => { if(btn.disabled) requestAnimationFrame(playSpinSound); }, nextTick);
                }
            }
            requestAnimationFrame(playSpinSound);
            setTimeout(() => {
                const final = (currentRotation % 360);
                const arcSize = 360 / items.length;
                lastWinnerIdx = Math.floor((270 - final + 360 * 10) % 360 / arcSize) % items.length;
                if(!items[lastWinnerIdx].correcta) { SFX.win(); createConfetti(); }
                openPanel(items[lastWinnerIdx]);
                btn.disabled = false;
            }, duration + 100);
        }

        function openPanel(q) {
            canAnswer = true;
            const panel = document.getElementById('floating-panel');
            const banner = document.getElementById('answer-banner');
            const questionEl = document.getElementById('panel-question');
            const container = document.getElementById('panel-options');
            banner.className = ""; banner.style.display = "none"; banner.innerHTML = "";
            questionEl.innerText = q.text; container.innerHTML = "";
            if(q.opciones && q.opciones.length > 0) {
                q.opciones.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn'; btn.innerHTML = opt;
                    btn.onclick = () => {
                        if(!canAnswer) return; canAnswer = false;
                        const esCorrecta = opt.toString().trim().toLowerCase() === q.correcta.toString().trim().toLowerCase();
                        banner.style.display = "block"; banner.innerHTML = `Respuesta: ${q.correcta}`;
                        if(esCorrecta) { 
                            SFX.correct(); banner.classList.add('banner-correct'); btn.classList.add('opt-correct'); aciertos++; createConfetti();
                        } else { 
                            SFX.wrong(); banner.classList.add('banner-wrong'); btn.classList.add('opt-wrong'); errores++;
                            document.querySelectorAll('.opt-btn').forEach(b => { if(b.innerText.trim().toLowerCase() === q.correcta.toString().trim().toLowerCase()) b.classList.add('opt-correct'); });
                        }
                        document.getElementById('count-aciertos').innerText = aciertos;
                        document.getElementById('count-errores').innerText = errores;
                    };
                    container.appendChild(btn);
                });
            } else { questionEl.innerText = q.text; container.innerHTML = ""; }
            panel.classList.add('active');
        }

        function closePanelManual() { SFX.click(); document.getElementById('floating-panel').classList.remove('active'); }
        function finalizeQuestion() { 
            SFX.click(); document.getElementById('floating-panel').classList.remove('active'); 
            if(document.getElementById('delete-mode').checked && lastWinnerIdx !== -1) items.splice(lastWinnerIdx, 1);
            saveData(); renderLogs(); draw(); 
            if (items.length > 0) setTimeout(() => spinNow(), 400);
        }

        function draw() {
            const canvas = document.getElementById('wheel');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,480,480);
            if(!items.length) return;
            const arc = (2 * Math.PI) / items.length;
            const activePalette = paletas[currentHue].colors;
            items.forEach((item, i) => {
                const angle = i * arc;
                ctx.fillStyle = activePalette[i % activePalette.length];
                ctx.beginPath(); ctx.moveTo(240, 240); ctx.arc(240, 240, 230, angle, angle + arc); ctx.fill();
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                ctx.save(); ctx.translate(240, 240); ctx.rotate(angle + arc/2);
                ctx.fillStyle = "#334155"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "right";
                ctx.fillText(item.text.toString().substring(0, 20), 210, 5); ctx.restore();
            });
        }

        function setPalette(hue, el) { currentHue = hue; document.querySelectorAll('.palette-option').forEach(d => d.classList.remove('active')); el.classList.add('active'); draw(); }
        
        /* Función setTheme modificada para integrar logos dinámicos */
        function setTheme(t) { 
            const isDark = t === 'dark';
            document.body.className = isDark ? 'theme-dark' : ''; 
            const logo = document.getElementById('dynamic-logo');
            logo.src = isDark ? 'Ukumari logo negro.jpg' : 'Ukumari logo blanco.jpg';
        }

        function resetScores() { aciertos = 0; errores = 0; document.getElementById('count-aciertos').innerText = "0"; document.getElementById('count-errores').innerText = "0"; }
        function renderLogs() { document.getElementById('chat-box').innerHTML = items.map((l, i) => `<div class="msg"><button style="position:absolute; right:5px; border:none; background:none; color:red; cursor:pointer;" onclick="deleteItem(${i})">×</button>${l.text}</div>`).join(''); }
        function deleteItem(i) { items.splice(i, 1); saveData(); renderLogs(); draw(); }
        function clearCurrent() { items = []; resetScores(); saveData(); renderLogs(); draw(); }
        function clearHistory() { sessionHistory = []; manualCount = 0; localStorage.setItem('uk_manual_count', 0); saveData(); renderHistory(); }
        function saveData() { localStorage.setItem('uk_items', JSON.stringify(items)); localStorage.setItem('uk_history', JSON.stringify(sessionHistory)); }
        function addToHistory(data, name) { if(!data.length) return; sessionHistory.unshift({ name, date: new Date().toLocaleString(), data: JSON.parse(JSON.stringify(data)) }); if(sessionHistory.length > 15) sessionHistory.pop(); saveData(); renderHistory(); }
        function renderHistory() { const box = document.getElementById('history-box'); if(!sessionHistory.length) { box.innerHTML = '<div style="font-size:0.7rem; color:#94a3b8; text-align:center;">Vacío</div>'; return; } box.innerHTML = sessionHistory.map((s, i) => `<div class="history-item" onclick="loadHistory(${i})"><span class="history-name">${s.name}</span><span class="history-date">${s.date} • ${s.data.length} items</span></div>`).join(''); }
        function loadHistory(i) { items = JSON.parse(JSON.stringify(sessionHistory[i].data)); resetScores(); saveData(); renderLogs(); draw(); }
        function addFromText() {
            const txt = document.getElementById('manual-text').value; if(!txt.trim()) return;
            items = txt.split('\n').filter(l => l.trim()).map(l => ({ text: l.trim(), correcta: "", opciones: [] }));
            manualCount++; resetScores(); addToHistory(items, `Ruleta Manual ${manualCount}`);
            localStorage.setItem('uk_manual_count', manualCount); saveData(); renderLogs(); draw(); document.getElementById('manual-text').value = "";
        }

        document.getElementById('excel-input').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const b = XLSX.read(evt.target.result, {type:'binary'});
                const data = XLSX.utils.sheet_to_json(b.Sheets[b.SheetNames[0]]);
                items = data.map(r => {
                    const k = Object.keys(r);
                    return { text: r[k[0]], correcta: r[k[1]], opciones: [r[k[2]], r[k[3]], r[k[4]], r[k[5]]].filter(o => o) };
                });
                resetScores(); addToHistory(items, file.name); saveData(); renderLogs(); draw();
            };
            reader.readAsBinaryString(file);
        });

        window.onload = () => { renderPaletteUI(); renderLogs(); renderHistory(); draw(); };
    </script>
</body>
</html>
